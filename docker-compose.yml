services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medify_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist uploaded files across container restarts during local dev
      - ./temp_uploads:/home/appuser/app/app/temp_uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
